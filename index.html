<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FrameX Store - Order Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Arial,sans-serif;
}

body{

    min-height:100vh;
    background:linear-gradient(135deg,#141e30,#243b55);

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

}


.container{

    width:100%;
    max-width:750px;

    background:white;

    border-radius:20px;

    overflow:hidden;

    box-shadow:0 20px 50px rgba(0,0,0,0.3);

}



.header{

    background:linear-gradient(135deg,#007bff,#00c6ff);

    color:white;

    text-align:center;

    padding:35px;

}


.header h1{

    font-size:32px;

}


.header p{

    margin-top:10px;

}



.form-area{

    padding:35px;

}



label{

    display:block;

    font-weight:600;

    margin-bottom:7px;

    color:#333;

}



input,
textarea,
select{

    width:100%;

    padding:13px;

    margin-bottom:20px;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:15px;

    outline:none;

}



input:focus,
textarea:focus,
select:focus{

    border-color:#007bff;

    box-shadow:0 0 8px rgba(0,123,255,.3);

}



textarea{

    height:100px;

    resize:none;

}



.row{

    display:flex;

    gap:15px;

}



.row div{

    flex:1;

}



.payment{

    background:#f5f7fa;

    padding:15px;

    border-radius:12px;

    margin-bottom:20px;

}



.radio{

    display:flex;

    align-items:center;

    gap:10px;

    margin-bottom:10px;

}



.radio input{

    width:auto;

    margin:0;

}



.checkbox{

    display:flex;

    gap:10px;

    align-items:center;

    margin-bottom:20px;

}



.checkbox input{

    width:auto;

}



button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#007bff,#00c6ff);

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}



button:hover{

    opacity:.9;

    transform:translateY(-2px);

}



.footer{

    background:#111;

    color:white;

    text-align:center;

    padding:15px;

    font-size:14px;

}



@media(max-width:600px){

.row{

    flex-direction:column;

}

.header h1{

    font-size:25px;

}

}


</style>

</head>


<body>


<div class="container">


<div class="header">

<h1>🖥 FrameX Store</h1>

<p>Place Your Order</p>

</div>



<div class="form-area">


<form action="https://formspree.io/f/YOUR_ID" method="POST">


<label>Customer Name *</label>

<input 
type="text"
name="customer_name"
placeholder="Customer Name..."
required>



<label>Address *</label>

<textarea
name="address"
placeholder="Address..."
required></textarea>



<div class="row">


<div>

<label>City *</label>

<input 
type="text"
name="city"
placeholder="City"
required>

</div>


<div>

<label>District</label>

<input 
type="text"
name="district"
placeholder="District">

</div>


</div>



<label>Contact Number One *</label>

<input
type="tel"
name="contact1"
placeholder="Contact Number..."
required>




<label>Contact Number Two</label>

<input
type="tel"
name="contact2"
placeholder="Contact Number...">





<label>Email</label>

<input
type="email"
name="email"
placeholder="Email...">





<label>Due Date *</label>

<input
type="date"
name="due_date"
required>





<label>Order Source</label>

<select name="source">

<option>Website</option>

<option>Facebook</option>

<option>WhatsApp</option>

<option>Instagram</option>

<option>Other</option>

</select>





<label>Payment Method *</label>


<div class="payment">


<label class="radio">

<input 
type="radio"
name="payment"
value="Cash On Delivery"
checked>

Cash On Delivery (COD)

</label>



<label class="radio">

<input 
type="radio"
name="payment"
value="Bank Transfer">

Bank Transfer

</label>




<label class="radio">

<input 
type="radio"
name="payment"
value="Card Payment">

Card Payment

</label>





<label class="radio">

<input 
type="radio"
name="payment"
value="Koko Installment">

Koko / Installment

</label>



</div>





<label>Order Note</label>


<textarea

name="note"

placeholder="Note About Order...">

</textarea>





<div class="checkbox">


<input

type="checkbox"

name="print">

<span>

Marked for Print Waybill Only

</span>


</div>





<button type="submit">

Submit Order

</button>



</form>


</div>



<div class="footer">

© 2026 FrameX Store | PC Parts & Accessories

</div>


</div>


</body>

</html>
